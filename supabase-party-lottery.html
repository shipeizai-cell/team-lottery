<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 团建饭店抽签系统（Supabase版）</title>
    <style>
        /* 全局样式 - 温暖美食风格 */
        :root {
            --color-primary: #ff9800;
            --color-primary-light: #ffb74d;
            --color-primary-dark: #f57c00;
            --color-secondary: #4caf50;
            --color-secondary-light: #81c784;
            --color-bg-light: #fffaf0;
            --color-bg-white: #fff;
            --color-text: #5a3921;
            --color-text-light: #8d6e63;
            --shadow-soft: 0 10px 30px rgba(255, 152, 0, 0.15);
            --shadow-hard: 0 20px 60px rgba(255, 152, 0, 0.25);
            --border-radius: 24px;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-light) 0%, #fff5e6 100%);
            min-height: 100vh;
            color: var(--color-text);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 背景装饰元素 */
        .food-decoration {
            position: fixed;
            z-index: -1;
            opacity: 0.1;
            font-size: 80px;
            user-select: none;
        }
        
        .food-decoration:nth-child(1) { top: 10%; left: 5%; animation: float 25s infinite linear; }
        .food-decoration:nth-child(2) { top: 20%; right: 10%; animation: float 30s infinite linear reverse; }
        .food-decoration:nth-child(3) { bottom: 15%; left: 15%; animation: float 35s infinite linear; }
        .food-decoration:nth-child(4) { bottom: 25%; right: 20%; animation: float 40s infinite linear reverse; }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        
        /* 主容器 */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
            background: var(--color-bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hard);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 152, 0, 0.1);
        }
        
        /* 顶部标题 */
        .main-header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 3px dashed var(--color-primary);
            position: relative;
        }
        
        .main-header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 6px;
            background: var(--color-primary);
            border-radius: 3px;
        }
        
        .main-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--color-primary-dark);
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 rgba(255, 152, 0, 0.1);
            letter-spacing: 1px;
        }
        
        .main-subtitle {
            font-size: 1.3rem;
            color: var(--color-text-light);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .title-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 统计卡片 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            border: 3px solid transparent;
            cursor: pointer;
        }
        
        .stat-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hard);
            border-color: var(--color-primary);
        }
        
        .stat-item.home {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-color: #2196f3;
        }
        
        .stat-item.restaurant {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            border-color: #f44336;
        }
        
        .stat-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.1));
        }
        
        .stat-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #333;
        }
        
        .stat-count {
            font-size: 4rem;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
        }
        
        .stat-progress {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .stat-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
            border-radius: 6px;
            transition: width 1s ease;
        }
        
        .stat-item.home .stat-progress-bar {
            background: linear-gradient(90deg, #2196f3, #1976d2);
        }
        
        .stat-item.restaurant .stat-progress-bar {
            background: linear-gradient(90deg, #f44336, #d32f2f);
        }
        
        .stat-percent {
            font-size: 1.4rem;
            font-weight: 700;
            color: #555;
        }
        
        /* 抽签按钮区域 */
        .lottery-container {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 50px;
            border: 4px solid var(--color-primary);
            position: relative;
            overflow: hidden;
        }
        
        .lottery-title {
            font-size: 2rem;
            color: var(--color-primary-dark);
            margin-bottom: 30px;
            font-weight: 800;
        }
        
        .lottery-button {
            background: linear-gradient(145deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border: none;
            padding: 25px 60px;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 40px rgba(255, 87, 34, 0.4);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .lottery-button:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 60px rgba(255, 87, 34, 0.6);
        }
        
        .lottery-button:active:not(:disabled) {
            transform: translateY(-4px);
        }
        
        .lottery-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: linear-gradient(145deg, #bdbdbd, #9e9e9e);
        }
        
        .button-emoji {
            font-size: 2.5rem;
            animation: spin 3s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 结果展示 */
        .result-container {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 50px;
            border: 4px solid var(--color-secondary);
            display: none;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-title {
            font-size: 1.8rem;
            color: var(--color-secondary);
            margin-bottom: 30px;
            font-weight: 800;
        }
        
        .result-content {
            font-size: 5rem;
            font-weight: 900;
            color: #1b5e20;
            margin: 30px 0;
            text-shadow: 4px 4px 0 rgba(56, 142, 60, 0.1);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .result-emoji {
            font-size: 6rem;
            display: block;
            margin-bottom: 20px;
            animation: celebrate 1s infinite;
        }
        
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* 底部信息 */
        .footer-info {
            text-align: center;
            padding-top: 30px;
            border-top: 2px dashed var(--color-primary);
            color: var(--color-text-light);
        }
        
        .participant-count {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .count-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--color-primary-dark);
            margin: 0 5px;
        }
        
        /* 加载动画 */
        .loading-spinner {
            width: 70px;
            height: 70px;
            border: 8px solid var(--color-primary);
            border-top: 8px solid transparent;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin: 30px auto;
            display: none;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container { padding: 25px; }
            .main-title { font-size: 2.2rem; }
            .stats-container { grid-template-columns: 1fr; }
            .lottery-button { padding: 20px 40px; font-size: 1.5rem; }
            .result-content { font-size: 3.5rem; }
            .food-decoration { font-size: 60px; }
        }
        
        @media (max-width: 480px) {
            .main-container { padding: 20px; }
            .main-title { font-size: 1.8rem; }
            .lottery-button { padding: 18px 30px; font-size: 1.3rem; }
            .result-content { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="food-decoration">🍲</div>
    <div class="food-decoration">🍜</div>
    <div class="food-decoration">🥘</div>
    <div class="food-decoration">🥗</div>
    
    <div class="main-container">
        <!-- 标题区域 -->
        <header class="main-header">
            <div class="title-emoji">🎲</div>
            <h1 class="main-title">周五吃啥？交给天意！</h1>
            <p class="main-subtitle">团建饭店随机抽签系统 · 50%概率抽取 · 每人仅一次机会 · 实时统计</p>
        </header>
        
        <!-- 统计区域 -->
        <div class="stats-container">
            <div class="stat-item home" id="stat-home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-progress">
                    <div class="stat-progress-bar" id="progress-home" style="width: 0%"></div>
                </div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-item restaurant" id="stat-restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-progress">
                    <div class="stat-progress-bar" id="progress-restaurant" style="width: 0%"></div>
                </div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <!-- 抽签区域 -->
        <div class="lottery-container" id="lottery-container">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <button class="lottery-button" id="lottery-button">
                <span class="button-emoji">🎲</span>
                <span id="button-text">点击开始抽签</span>
            </button>
            <div class="loading-spinner" id="loading-spinner"></div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result-container" id="result-container">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 30px; color: #666; font-size: 1.2rem; line-height: 1.6;">
                <i class="fas fa-check-circle" style="color: #4caf50; margin-right: 8px;"></i>
                已为你记录抽签结果，可查看上方实时统计更新
            </p>
        </div>
        
        <!-- 底部信息 -->
        <footer class="footer-info">
            <div class="participant-count">
                👥 已参与人数：
                <span class="count-number" id="total-participants">0</span>
                人
            </div>
            <p style="margin: 15px 0; font-size: 1.1rem;">
                <i class="fas fa-shield-alt" style="color: var(--color-primary); margin-right: 8px;"></i>
                系统自动防重复 · 每人仅可参与一次
            </p>
            <p style="font-size: 0.9rem; color: #999; margin-top: 20px;">
                🍽️ 温暖美食风格 · 🎲 随机抽签系统 · 🔗 Supabase实时同步
            </p>
        </footer>
    </div>
    
    <!-- Supabase连接脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase配置（使用你的实际项目信息）
        const SUPABASE_URL = 'https://flarbbfcedplhrpswscm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsYXJiYmZjZWRwbGhycHN3c2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDY4MjQsImV4cCI6MjA4OTkyMjgyNH0.6_j-QbOmgfWT5d_7M6cRFNPZo9JVRj1QQkiEZK5sTGY';
        
        // 初始化Supabase客户端
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 状态管理
        let lotteryStats = {
            home: { count: 0, percentage: 0 },
            restaurant: { count: 0, percentage: 0 }
        };
        
        let userParticipated = localStorage.getItem('user_participated') === 'true';
        let userResult = localStorage.getItem('user_result');
        
        // DOM元素
        const lotteryButton = document.getElementById('lottery-button');
        const buttonText = document.getElementById('button-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const resultContainer = document.getElementById('result-container');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        
        // 统计元素
        const countHome = document.getElementById('count-home');
        const progressHome = document.getElementById('progress-home');
        const percentHome = document.getElementById('percent-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const progressRestaurant = document.getElementById('progress-restaurant');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalParticipants = document.getElementById('total-participants');
        
        // 初始化应用
        async function initApp() {
            console.log('🎲 初始化抽签系统...');
            
            // 检查用户是否已参与
            if (userParticipated) {
                disableLotteryButton();
                showUserResult();
            }
            
            // 加载统计数据
            await loadStatistics();
            
            // 设置自动刷新
            setInterval(loadStatistics, 5000);
            
            console.log('✅ 系统初始化完成');
        }
        
        // 加载统计数据
        async function loadStatistics() {
            try {
                // 调用Supabase函数获取统计数据
                const { data, error } = await supabase
                    .rpc('get_lottery_stats');
                
                if (error) {
                    console.error('获取统计数据失败:', error);
                    return;
                }
                
                // 更新统计数据
                if (data && data.length > 0) {
                    data.forEach(item => {
                        if (item.option_name === '家里蹲') {
                            lotteryStats.home.count = item.count || 0;
                            lotteryStats.home.percentage = item.percentage || 0;
                        } else if (item.option_name === '歆弘府') {
                            lotteryStats.restaurant.count = item.count || 0;
                            lotteryStats.restaurant.percentage = item.percentage || 0;
                        }
                    });
                    
                    updateUIStatistics();
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 更新UI统计
        function updateUIStatistics() {
            // 更新数字
            countHome.textContent = lotteryStats.home.count;
            countRestaurant.textContent = lotteryStats.restaurant.count;
            
            // 更新百分比
            const homePercent = lotteryStats.home.percentage || 0;
            const restaurantPercent = lotteryStats.restaurant.percentage || 0;
            
            percentHome.textContent = `${homePercent.toFixed(1)}%`;
            percentRestaurant.textContent = `${restaurantPercent.toFixed(1)}%`;
            
            // 更新进度条
            progressHome.style.width = `${homePercent}%`;
            progressRestaurant.style.width = `${restaurantPercent}%`;
            
            // 更新总人数
            const total = lotteryStats.home.count + lotteryStats.restaurant.count;
            totalParticipants.textContent = total;
        }
        
        // 执行抽签
        async function performLottery() {
            console.log('🎲 开始抽签...');
            
            // 显示加载状态
            lotteryButton.disabled = true;
            buttonText.textContent = '抽签中...';
            loadingSpinner.style.display = 'block';
            
            try {
                // 生成用户ID（基于浏览器指纹）
                const userId = generateUserId();
                
                // 调用Supabase抽签函数
                const { data, error } = await supabase
                    .rpc('perform_lottery', {
                        p_user_id: userId,
                        p_user_ip: null,
                        p_user_agent: navigator.userAgent
                    });
                
                if (error) {
                    console.error('抽签失败:', error);
                    
                    if (error.message.includes('已抽签')) {
                        alert('您已经抽过签了，每人仅有一次机会哦！');
                        disableLotteryButton();
                        return;
                    }
                    
                    alert('抽签失败，请稍后重试');
                    resetLotteryButton();
                    return;
                }
                
                // 抽签成功
                console.log('🎉 抽签结果:', data);
                
                // 保存用户状态
                userParticipated = true;
                userResult = data;
                localStorage.setItem('user_participated', 'true');
                localStorage.setItem('user_result', data);
                
                // 显示结果
                showLotteryResult(data);
                
                // 重新加载统计
                setTimeout(() => loadStatistics(), 1000);
                
            } catch (error) {
                console.error('抽签异常:', error);
                alert('抽签过程中出现错误，请刷新页面重试');
                resetLotteryButton();
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }
        
        // 显示抽签结果
        function showLotteryResult(result) {
            // 禁用按钮
            disableLotteryButton();
            
            // 设置结果内容
            if (result === '家里蹲') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultContent.style.color = '#2196f3';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultContent.style.color = '#f44336';
            }
            
            // 显示结果容器
            resultContainer.style.display = 'block';
            
            // 滚动到结果
            setTimeout(() => {
                resultContainer.scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'center' 
                });
            }, 300);
            
            // 播放庆祝效果
            playCelebration();
        }
        
        // 显示用户之前的结果
        function showUserResult() {
            if (!userResult) return;
            
            if (userResult === '家里蹲') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultContent.style.color = '#2196f3';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultContent.style.color = '#f44336';
            }
            
            resultContainer.style.display = 'block';
            buttonText.textContent = '已抽签';
        }
        
        // 禁用抽签按钮
        function disableLotteryButton() {
            lotteryButton.disabled = true;
            buttonText.textContent = '已抽签';
        }
        
        // 重置抽签按钮
        function resetLotteryButton() {
            lotteryButton.disabled = false;
            buttonText.textContent = '点击开始抽签';
            loadingSpinner.style.display = 'none';
        }
        
        // 生成用户ID（简易版浏览器指纹）
        function generateUserId() {
            const timestamp = Date.now();
            const random = Math.random().toString(36).substr(2, 9);
            return `user_${timestamp}_${random}`;
        }
        
        // 庆祝效果
        function playCelebration() {
            // 创建庆祝动画元素
            const emojis = ['🎉', '✨', '🥳', '🎊', '👏'];
            const container = document.querySelector('.main-container');
            
            for (let i = 0; i < 15; i++) {
                const emoji = document.createElement('div');
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.position = 'absolute';
                emoji.style.fontSize = '30px';
                emoji.style.left = `${Math.random() * 100}%`;
                emoji.style.top = `${Math.random() * 100}%`;
                emoji.style.zIndex = '1000';
                emoji.style.pointerEvents = 'none';
                emoji.style.animation = `float 2s ease-out forwards`;
                
                container.appendChild(emoji);
                
                // 清理
                setTimeout(() => emoji.remove(), 2000);
            }
            
            // 震动效果
            document.body.style.transform = 'translateX(5px)';
            setTimeout(() => document.body.style.transform = 'translateX(-5px)', 50);
            setTimeout(() => document.body.style.transform = 'translateX(0)', 100);
        }
        
        // 事件监听
        lotteryButton.addEventListener('click', performLottery);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !userParticipated) {
                e.preventDefault();
                lotteryButton.click();
            }
        });
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initApp);
        
        // 初始化完成提示
        console.log('🚀 团建饭店抽签系统已加载');
        console.log('📊 连接到Supabase:', SUPABASE_URL);
        console.log('🎯 功能：随机抽签、实时统计、防重复、温暖美食风格');
    </script>
</body>
