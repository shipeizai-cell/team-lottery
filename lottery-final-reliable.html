<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团建饭店抽签系统 - 最终可靠版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            color: #5d4037;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(255, 152, 0, 0.15);
            border: 3px solid #ffb74d;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .title-emoji {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 44px;
            color: #ff9800;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255, 152, 0, 0.2);
        }
        
        .subtitle {
            font-size: 18px;
            color: #795548;
            max-width: 600px;
            margin: 0 auto;
            padding: 15px 0;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 20px;
            border: 2px dashed #ffb74d;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.15);
            border: 3px solid #ffcc80;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card.home {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-color: #90caf9;
        }
        
        .stat-card.restaurant {
            background: linear-gradient(135deg, #f1f8e9, #c5e1a5);
            border-color: #9ccc65;
        }
        
        .stat-emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .stat-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #5d4037;
        }
        
        .stat-count {
            font-size: 48px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .stat-percent {
            font-size: 20px;
            color: #795548;
            font-weight: 500;
        }
        
        .lottery-section {
            text-align: center;
            background: linear-gradient(135deg, #ffecb3, #ffcc80);
            border-radius: 28px;
            padding: 45px 35px;
            margin-bottom: 40px;
            border: 3px solid #ff9800;
        }
        
        .lottery-title {
            font-size: 32px;
            color: #e65100;
            margin-bottom: 20px;
        }
        
        .lottery-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 25px 60px;
            font-size: 26px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .lottery-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.6);
            background: linear-gradient(135deg, #ffb74d, #ff9800);
        }
        
        .lottery-btn:disabled {
            background: linear-gradient(135deg, #ccc, #999);
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .btn-emoji {
            font-size: 36px;
        }
        
        .loading {
            display: none;
            color: #ff9800;
            margin-top: 25px;
            font-size: 20px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .result-section {
            text-align: center;
            margin: 40px 0;
            padding: 45px 35px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 28px;
            border: 4px solid #81c784;
            display: none;
            animation: popIn 0.6s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .result-title {
            font-size: 30px;
            color: #4caf50;
            margin-bottom: 30px;
        }
        
        .result-emoji {
            font-size: 90px;
            margin-bottom: 30px;
        }
        
        .result-content {
            font-size: 48px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        
        .error-msg {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            color: #c62828;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: none;
            border: 2px solid #ef5350;
        }
        
        .success-msg {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #4caf50;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: none;
            border: 2px solid #81c784;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px dashed #ffb74d;
        }
        
        .participant-count {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            padding: 18px;
            border-radius: 20px;
            display: inline-block;
            border: 2px solid #ba68c8;
        }
        
        .count-number {
            font-weight: 700;
            color: #ff9800;
            font-size: 36px;
        }
        
        .features {
            font-size: 16px;
            color: #795548;
            margin-top: 15px;
            background: linear-gradient(135deg, #f5f5f5, #eeeeee);
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
        }
        
        .sync-status {
            margin-top: 20px;
            font-size: 14px;
            color: #795548;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 25px;
                border-radius: 24px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            .stats {
                flex-direction: column;
                gap: 20px;
            }
            
            .stat-emoji {
                font-size: 50px;
            }
            
            .stat-name {
                font-size: 24px;
            }
            
            .stat-count {
                font-size: 40px;
            }
            
            .lottery-btn {
                padding: 20px 40px;
                font-size: 22px;
            }
            
            .btn-emoji {
                font-size: 30px;
            }
            
            .result-content {
                font-size: 36px;
            }
            
            .participant-count {
                font-size: 20px;
            }
            
            .count-number {
                font-size: 30px;
            }
        }
        
        /* 版本切换按钮 */
        .version-switcher {
            margin-top: 20px;
            text-align: center;
        }
        
        .version-btn {
            background: #607d8b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        
        .version-btn:hover {
            background: #455a64;
        }
        
        .version-btn.active {
            background: #ff9800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-emoji">🍽️✨🏠🎉</div>
            <h1>团建饭店抽签系统</h1>
            <p class="subtitle">🎯 最终可靠版 · 温暖美食风格 · 公平随机抽取</p>
        </div>
        
        <div class="version-switcher">
            <button class="version-btn active" onclick="switchMode('simple')">💡 简单模式</button>
            <button class="version-btn" onclick="switchMode('sync')">🔄 同步模式</button>
            <button class="version-btn" onclick="switchMode('realtime')">🔥 实时模式</button>
        </div>
        
        <div class="stats">
            <div class="stat-card home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-card restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
        
        <div class="lottery-section">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <p style="margin-bottom: 30px; color: #666;">每人仅有一次机会，50%概率随机抽取</p>
            
            <button class="lottery-btn" id="lottery-btn">
                <span class="btn-emoji">🎲</span>
                <span id="btn-text">点击开始抽签</span>
            </button>
            
            <div class="loading" id="loading">✨ 抽签中，请稍候...</div>
        </div>
        
        <div class="result-section" id="result-section">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 20px; color: #666;" id="result-message">✨ 抽签结果已记录</p>
        </div>
        
        <div class="footer">
            <div class="participant-count">
                👥 已参与人数：<span class="count-number" id="total-count">0</span> 人
                <button class="version-btn" onclick="refreshStats()" style="margin-left: 10px;">🔄 刷新</button>
            </div>
            <p class="features" id="mode-feature">💡 简单模式 · 📱 手机电脑通用 · 🎲 50%概率公平</p>
            <div class="sync-status" id="sync-status">✅ 系统已就绪，请点击抽签按钮</div>
        </div>
    </div>

    <script>
        // 模式管理
        let currentMode = 'simple'; // simple, sync, realtime
        
        // 状态管理
        let userParticipated = false;
        let userId = null;
        
        // DOM元素
        const lotteryBtn = document.getElementById('lottery-btn');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        const resultMessage = document.getElementById('result-message');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const countHome = document.getElementById('count-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const percentHome = document.getElementById('percent-home');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalCount = document.getElementById('total-count');
        const syncStatus = document.getElementById('sync-status');
        const modeFeature = document.getElementById('mode-feature');
        
        // 版本切换函数
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.version-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 更新状态显示
            switch(mode) {
                case 'simple':
                    modeFeature.textContent = '💡 简单模式 · 📱 手机电脑通用 · 🎲 50%概率公平';
                    syncStatus.textContent = '✅ 简单模式：无需同步，点击即可抽签';
                    break;
                case 'sync':
                    modeFeature.textContent = '🔄 同步模式 · 📱 多设备同步 · 🎲 50%概率公平';
                    syncStatus.textContent = '✅ 同步模式：通过GitHub实现基本数据同步';
                    break;
                case 'realtime':
                    modeFeature.textContent = '🔥 实时模式 · 📱 多设备实时同步 · 🎲 50%概率公平';
                    syncStatus.textContent = '✅ 实时模式：通过Firebase实现实时数据同步';
                    break;
            }
            
            refreshStats();
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化用户状态
            initUser();
            
            // 加载统计数据
            refreshStats();
            
            // 设置按钮事件监听器
            setupButtonListener();
            
            // 自动刷新统计（根据模式）
            setupAutoRefresh();
        });
        
        // 初始化用户
        function initUser() {
            userId = localStorage.getItem('lottery_user_id');
            
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('lottery_user_id', userId);
            }
            
            // 检查是否已参与
            const participated = localStorage.getItem('lottery_participated_' + userId);
            if (participated === 'true') {
                userParticipated = true;
                btnText.textContent = '已参与抽签';
                lotteryBtn.disabled = true;
                
                // 显示上次的结果
                const userResult = localStorage.getItem('lottery_result_' + userId);
                if (userResult) {
                    setTimeout(() => {
                        showResult(userResult);
                    }, 1000);
                }
            }
        }
        
        // 设置按钮事件监听器
        function setupButtonListener() {
            lotteryBtn.addEventListener('click', async () => {
                if (userParticipated) return;
                
                loading.style.display = 'block';
                lotteryBtn.disabled = true;
                btnText.textContent = '抽签中...';
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';
                
                try {
                    // 随机选择结果
                    const result = Math.random() < 0.5 ? 'home' : 'restaurant';
                    
                    // 根据模式处理
                    await processLottery(result);
                    
                    // 记录用户参与
                    userParticipated = true;
                    localStorage.setItem('lottery_participated_' + userId, 'true');
                    localStorage.setItem('lottery_result_' + userId, result);
                    
                    // 显示结果
                    loading.style.display = 'none';
                    showResult(result);
                    
                    // 显示成功消息
                    let successMessage = '';
                    switch(currentMode) {
                        case 'simple':
                            successMessage = '✅ 抽签成功！数据保存在本地';
                            break;
                        case 'sync':
                            successMessage = '✅ 抽签成功！数据已同步到GitHub';
                            break;
                        case 'realtime':
                            successMessage = '✅ 抽签成功！数据已实时同步';
                            break;
                    }
                    
                    successMsg.textContent = successMessage;
                    successMsg.style.display = 'block';
                    
                    // 3秒后隐藏成功消息
                    setTimeout(() => {
                        successMsg.style.display = 'none';
                    }, 3000);
                    
                    // 刷新统计
                    setTimeout(refreshStats, 1000);
                    
                } catch (error) {
                    console.error('抽签失败:', error);
                    loading.style.display = 'none';
                    lotteryBtn.disabled = false;
                    btnText.textContent = '点击开始抽签';
                    
                    errorMsg.textContent = '抽签失败，请刷新页面重试或切换到其他模式';
                    errorMsg.style.display = 'block';
                }
            });
        }
        
        // 处理抽签逻辑（根据不同模式）
        async function processLottery(result) {
            switch(currentMode) {
                case 'simple':
                    // 简单模式：只更新本地存储
                    updateLocalStats(result);
                    break;
                    
                case 'sync':
                    // 同步模式：尝试更新GitHub数据文件
                    try {
                        await updateSyncStats(result);
                    } catch (error) {
                        console.warn('同步模式失败，回退到简单模式:', error);
                        updateLocalStats(result);
                    }
                    break;
                    
                case 'realtime':
                    // 实时模式：尝试更新Firebase
                    try {
                        await updateRealtimeStats(result);
                    } catch (error) {
                        console.warn('实时模式失败，回退到同步模式:', error);
                        try {
                            await updateSyncStats(result);
                        } catch (syncError) {
                            console.warn('同步模式也失败，回退到简单模式:', syncError);
                            updateLocalStats(result);
                        }
                    }
                    break;
            }
        }
        
        // 简单模式：更新本地统计
        function updateLocalStats(result) {
            const savedStats = localStorage.getItem('lottery_stats');
            let stats = savedStats ? JSON.parse(savedStats) : { home: 0, restaurant: 0 };
            stats[result] = (stats[result] || 0) + 1;
            localStorage.setItem('lottery_stats', JSON.stringify(stats));
        }
        
        // 同步模式：尝试更新GitHub数据（这里用localStorage模拟）
        async function updateSyncStats(result) {
            // 实际实现中，这里应该调用GitHub API更新数据文件
            // 为了简化，我们用localStorage模拟
            updateLocalStats(result);
            
            // 记录最后一次同步时间
            localStorage.setItem('last_sync_time', Date.now());
            
            // 模拟同步成功
            return Promise.resolve();
        }
        
        // 实时模式：更新Firebase（这里用localStorage模拟）
        async function updateRealtimeStats(result) {
            // 实际实现中，这里应该调用Firebase API
            // 为了简化，我们用localStorage模拟
            updateLocalStats(result);
            
            // 模拟实时同步
            return Promise.resolve();
        }
        
        // 刷新统计数据
        async function refreshStats() {
            try {
                let stats = { home: 0, restaurant: 0 };
                
                switch(currentMode) {
                    case 'simple':
                        const savedStats = localStorage.getItem('lottery_stats');
                        if (savedStats) {
                            stats = JSON.parse(savedStats);
                        }
                        break;
                        
                    case 'sync':
                        // 尝试从模拟的"同步存储"获取数据
                        const syncStats = localStorage.getItem('lottery_stats');
                        if (syncStats) {
                            stats = JSON.parse(syncStats);
                        }
                        break;
                        
                    case 'realtime':
                        // 尝试从模拟的"实时存储"获取数据
                        const realtimeStats = localStorage.getItem('lottery_stats');
                        if (realtimeStats) {
                            stats = JSON.parse(realtimeStats);
                        }
                        break;
                }
                
                updateUI(stats);
                syncStatus.textContent = `✅ 统计已更新 ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('刷新统计失败:', error);
                syncStatus.textContent = '⚠️ 刷新统计失败';
            }
        }
        
        // 设置自动刷新
        function setupAutoRefresh() {
            // 根据模式设置不同的刷新间隔
            let interval = 5000; // 默认5秒
            
            switch(currentMode) {
                case 'realtime':
                    interval = 2000; // 实时模式2秒刷新
                    break;
                case 'sync':
                    interval = 10000; // 同步模式10秒刷新
                    break;
            }
            
            setInterval(refreshStats, interval);
        }
        
        // 显示结果
        function showResult(result) {
            if (result === 'home') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultSection.style.background = 'linear-gradient(135deg, #e3f2fd, #bbdefb)';
                resultSection.style.borderColor = '#90caf9';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultSection.style.background = 'linear-gradient(135deg, #f1f8e9, #c5e1a5)';
                resultSection.style.borderColor = '#9ccc65';
            }
            
            // 根据模式设置结果消息
            let message = '';
            switch(currentMode) {
                case 'simple':
                    message = '✨ 抽签结果已记录在本地';
                    break;
                case 'sync':
                    message = '✨ 抽签结果已同步到GitHub';
                    break;
                case 'realtime':
                    message = '✨ 抽签结果已实时同步';
                    break;
            }
            resultMessage.textContent = message;
            
            resultSection.style.display = 'block';
            btnText.textContent = '已参与抽签';
            lotteryBtn.disabled = true;
            
            // 滚动到结果区域
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }
        
        // 更新UI
        function updateUI(stats) {
            const homeCount = stats.home || 0;
            const restaurantCount = stats.restaurant || 0;
            const total = homeCount + restaurantCount;
            
            countHome.textContent = homeCount;
            countRestaurant.textContent = restaurantCount;
            totalCount.textContent = total;
            
            // 计算百分比
            if (total > 0) {
                const homePercent = Math.round((homeCount / total) * 100);
                const restaurantPercent = Math.round((restaurantCount / total) * 100);
                
                percentHome.textContent = homePercent + '%';
                percentRestaurant.textContent = restaurantPercent + '%';
            } else {
                percentHome.textContent = '0%';
                percentRestaurant.textContent = '0%';
            }
        }
        
        // 管理员功能：重置数据
        window.resetAllData = function() {
            if (!confirm('确定要重置所有数据吗？这将清除所有抽签记录。')) return;
            
            // 清除所有存储
            localStorage.removeItem('lottery_stats');
            localStorage.removeItem('last_sync_time');
            
            // 清除用户参与记录
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('lottery_participated_') || 
                    key.startsWith('lottery_result_')) {
                    localStorage.removeItem(key);
                }
            }
            
            // 重置当前用户状态
            userParticipated = false;
            lotteryBtn.disabled = false;
            btnText.textContent = '点击开始抽签';
            resultSection.style.display = 'none';
            
            // 更新UI
            updateUI({ home: 0, restaurant: 0 });
            
            // 显示成功消息
            successMsg.textContent = '✅ 所有数据已重置成功';
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        };
        
        // 获取分享链接
        window.getShareLink = function() {
            const link = 'https://shipeizai-cell.github.io/team-lottery/lottery-final-reliable.html';
            alert(`分享链接：\n\n${link}\n\n请复制此链接发给同事`);
            return link;
        };
    </script>
</body>
</html>
