<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团建饭店抽签系统 - 多人在线实时版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            color: #5d4037;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(255, 152, 0, 0.15);
            border: 3px solid #ffb74d;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .title-emoji {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 44px;
            color: #ff9800;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255, 152, 0, 0.2);
        }
        
        .subtitle {
            font-size: 18px;
            color: #795548;
            max-width: 600px;
            margin: 0 auto;
            padding: 15px 0;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 20px;
            border: 2px dashed #ffb74d;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.15);
            border: 3px solid #ffcc80;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card.home {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-color: #90caf9;
        }
        
        .stat-card.restaurant {
            background: linear-gradient(135deg, #f1f8e9, #c5e1a5);
            border-color: #9ccc65;
        }
        
        .stat-emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .stat-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #5d4037;
        }
        
        .stat-count {
            font-size: 48px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .stat-percent {
            font-size: 20px;
            color: #795548;
            font-weight: 500;
        }
        
        .lottery-section {
            text-align: center;
            background: linear-gradient(135deg, #ffecb3, #ffcc80);
            border-radius: 28px;
            padding: 45px 35px;
            margin-bottom: 40px;
            border: 3px solid #ff9800;
        }
        
        .lottery-title {
            font-size: 32px;
            color: #e65100;
            margin-bottom: 20px;
        }
        
        .lottery-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 25px 60px;
            font-size: 26px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .lottery-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.6);
            background: linear-gradient(135deg, #ffb74d, #ff9800);
        }
        
        .lottery-btn:disabled {
            background: linear-gradient(135deg, #ccc, #999);
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .btn-emoji {
            font-size: 36px;
        }
        
        .loading {
            display: none;
            color: #ff9800;
            margin-top: 25px;
            font-size: 20px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .result-section {
            text-align: center;
            margin: 40px 0;
            padding: 45px 35px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 28px;
            border: 4px solid #81c784;
            display: none;
            animation: popIn 0.6s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .result-title {
            font-size: 30px;
            color: #4caf50;
            margin-bottom: 30px;
        }
        
        .result-emoji {
            font-size: 90px;
            margin-bottom: 30px;
        }
        
        .result-content {
            font-size: 48px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        
        .error-msg {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            color: #c62828;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: none;
            border: 2px solid #ef5350;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px dashed #ffb74d;
        }
        
        .participant-count {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            padding: 18px;
            border-radius: 20px;
            display: inline-block;
            border: 2px solid #ba68c8;
        }
        
        .count-number {
            font-weight: 700;
            color: #ff9800;
            font-size: 36px;
        }
        
        .features {
            font-size: 16px;
            color: #795548;
            margin-top: 15px;
            background: linear-gradient(135deg, #f5f5f5, #eeeeee);
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
        }
        
        .sync-status {
            margin-top: 20px;
            font-size: 14px;
            color: #795548;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 25px;
                border-radius: 24px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            .stats {
                flex-direction: column;
                gap: 20px;
            }
            
            .stat-emoji {
                font-size: 50px;
            }
            
            .stat-name {
                font-size: 24px;
            }
            
            .stat-count {
                font-size: 40px;
            }
            
            .lottery-btn {
                padding: 20px 40px;
                font-size: 22px;
            }
            
            .btn-emoji {
                font-size: 30px;
            }
            
            .result-content {
                font-size: 36px;
            }
            
            .participant-count {
                font-size: 20px;
            }
            
            .count-number {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-emoji">🍽️✨🏠🎉</div>
            <h1>团建饭店抽签系统</h1>
            <p class="subtitle">🔥 多人在线实时同步 · 温暖美食风格 · 公平随机抽取</p>
        </div>
        
        <div class="stats">
            <div class="stat-card home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-card restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <div class="error-msg" id="error-msg"></div>
        
        <div class="lottery-section">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <p style="margin-bottom: 30px; color: #666;">每人仅有一次机会，50%概率随机抽取，所有设备实时同步</p>
            
            <button class="lottery-btn" id="lottery-btn">
                <span class="btn-emoji">🎲</span>
                <span id="btn-text">点击开始抽签</span>
            </button>
            
            <div class="loading" id="loading">✨ 抽签中，请稍候...</div>
        </div>
        
        <div class="result-section" id="result-section">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 20px; color: #666;">你的选择已实时同步到所有设备 ✨</p>
        </div>
        
        <div class="footer">
            <div class="participant-count">
                👥 已参与人数：<span class="count-number" id="total-count">0</span> 人
            </div>
            <p class="features">🔥 多设备实时同步 · 📱 手机电脑通用 · 🎲 50%概率公平</p>
            <div class="sync-status" id="sync-status">🔄 已连接到实时数据库</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js"></script>
    
    <script>
        // Firebase配置
        const firebaseConfig = {
            apiKey: "AIzaSyBm8YVKwtzTJd6beT_d4BD3dOxslKPK0j8",
            authDomain: "team-lottery-demo.firebaseapp.com",
            databaseURL: "https://team-lottery-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "team-lottery-demo",
            storageBucket: "team-lottery-demo.appspot.com",
            messagingSenderId: "995721997071",
            appId: "1:995721997071:web:a6ef5939d3096cf2ce2f12"
        };

        // 初始化Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 状态管理
        let userParticipated = false;
        let userId = null;

        // DOM元素
        const lotteryBtn = document.getElementById('lottery-btn');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        const errorMsg = document.getElementById('error-msg');
        const countHome = document.getElementById('count-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const percentHome = document.getElementById('percent-home');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalCount = document.getElementById('total-count');
        const syncStatus = document.getElementById('sync-status');

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            // 检查用户是否已参与
            checkUserParticipation();
            
            // 监听实时数据变化
            setupRealtimeListener();
            
            // 更新连接状态
            updateConnectionStatus();
        });

        // 监听实时数据变化
        function setupRealtimeListener() {
            // 监听统计数据变化
            database.ref('stats').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const stats = snapshot.val();
                    updateUI(stats);
                    syncStatus.textContent = '✅ 实时数据已同步';
                    syncStatus.style.color = '#4caf50';
                }
            }, (error) => {
                console.error('实时数据监听失败:', error);
                syncStatus.textContent = '❌ 实时数据同步失败，使用本地模式';
                syncStatus.style.color = '#f44336';
            });
        }

        // 更新连接状态
        function updateConnectionStatus() {
            const connectedRef = database.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    syncStatus.textContent = '✅ 已连接到实时数据库';
                    syncStatus.style.color = '#4caf50';
                } else {
                    syncStatus.textContent = '🔌 正在重新连接...';
                    syncStatus.style.color = '#ff9800';
                }
            });
        }

        // 检查用户是否已参与
        function checkUserParticipation() {
            userId = localStorage.getItem('lottery_user_id');
            
            if (!userId) {
                // 创建新用户ID
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('lottery_user_id', userId);
            }
            
            // 检查数据库中的用户参与状态
            database.ref('participants/' + userId).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        userParticipated = true;
                        btnText.textContent = '已参与抽签';
                        lotteryBtn.disabled = true;
                        
                        // 显示用户的结果
                        if (userData.result) {
                            setTimeout(() => {
                                showResult(userData.result);
                            }, 1000);
                        }
                    }
                })
                .catch((error) => {
                    console.error('检查用户参与状态失败:', error);
                });
        }

        // 抽签函数
        lotteryBtn.addEventListener('click', async () => {
            if (userParticipated) return;
            
            loading.style.display = 'block';
            lotteryBtn.disabled = true;
            btnText.textContent = '抽签中...';
            errorMsg.style.display = 'none';
            
            try {
                // 随机选择结果
                const result = Math.random() < 0.5 ? 'home' : 'restaurant';
                
                // 更新统计数据
                const statsRef = database.ref('stats');
                const statsSnapshot = await statsRef.once('value');
                let stats = statsSnapshot.val() || { home: 0, restaurant: 0 };
                
                // 增加计数
                stats[result] = (stats[result] || 0) + 1;
                
                // 更新数据库
                await statsRef.set(stats);
                
                // 记录用户参与
                await database.ref('participants/' + userId).set({
                    result: result,
                    timestamp: Date.now()
                });
                
                // 更新本地状态
                userParticipated = true;
                localStorage.setItem('lottery_participated', 'true');
                
                // 显示结果
                loading.style.display = 'none';
                showResult(result);
                
                syncStatus.textContent = '✅ 抽签结果已同步到所有设备';
                syncStatus.style.color = '#4caf50';
                
            } catch (error) {
                console.error('抽签失败:', error);
                loading.style.display = 'none';
                lotteryBtn.disabled = false;
                btnText.textContent = '点击开始抽签';
                
                errorMsg.textContent = '抽签失败，请刷新页面重试';
                errorMsg.style.display = 'block';
            }
        });

        // 显示结果
        function showResult(result) {
            if (result === 'home') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultSection.style.background = 'linear-gradient(135deg, #e3f2fd, #bbdefb)';
                resultSection.style.borderColor = '#90caf9';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultSection.style.background = 'linear-gradient(135deg, #f1f8e9, #c5e1a5)';
                resultSection.style.borderColor = '#9ccc65';
            }
            
            resultSection.style.display = 'block';
            btnText.textContent = '已参与抽签';
            lotteryBtn.disabled = true;
            
            // 滚动到结果区域
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        // 更新UI
        function updateUI(stats) {
            const homeCount = stats.home || 0;
            const restaurantCount = stats.restaurant || 0;
            const total = homeCount + restaurantCount;
            
            countHome.textContent = homeCount;
            countRestaurant.textContent = restaurantCount;
            totalCount.textContent = total;
            
            // 计算百分比
            if (total > 0) {
                const homePercent = Math.round((homeCount / total) * 100);
                const restaurantPercent = Math.round((restaurantCount / total) * 100);
                
                percentHome.textContent = homePercent + '%';
                percentRestaurant.textContent = restaurantPercent + '%';
            } else {
                percentHome.textContent = '0%';
                percentRestaurant.textContent = '0%';
            }
        }

        // 数据清理函数（仅用于演示）
        window.resetData = async function() {
            if (!confirm('确定要重置所有数据吗？这将删除所有抽签记录。')) return;
            
            try {
                await database.ref('stats').set({ home: 0, restaurant: 0 });
                await database.ref('participants').remove();
                
                // 清理本地存储
                localStorage.removeItem('lottery_participated');
                localStorage.removeItem('lottery_user_id');
                
                userParticipated = false;
                lotteryBtn.disabled = false;
                btnText.textContent = '点击开始抽签';
                resultSection.style.display = 'none';
                errorMsg.textContent = '✅ 数据已重置成功';
                errorMsg.style.background = 'linear-gradient(135deg, #e8f5e9, #c8e6c9)';
                errorMsg.style.color = '#4caf50';
                errorMsg.style.borderColor = '#81c784';
                errorMsg.style.display = 'block';
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
                
            } catch (error) {
                console.error('重置数据失败:', error);
                errorMsg.textContent = '重置数据失败';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
