<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团建饭店抽签系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fffaf0 0%, #ffecb3 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(255, 152, 0, 0.15);
            border: 2px solid #ffd54f;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .title-emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #ffb74d;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(255, 152, 0, 0.1);
            border: 2px solid #ffd54f;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff9800, #ffd54f);
        }
        
        .stat-emoji {
            font-size: 40px;
            margin-bottom: 12px;
        }
        
        .stat-name {
            font-size: 18px;
            font-weight: 600;
            color: #ff9800;
            margin-bottom: 8px;
        }
        
        .stat-count {
            font-size: 42px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 5px;
        }
        
        .stat-percent {
            font-size: 16px;
            color: #ffb74d;
            font-weight: 500;
        }
        
        .lottery-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .lottery-title {
            font-size: 24px;
            color: #ff9800;
            margin-bottom: 15px;
        }
        
        .lottery-btn {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            border: none;
            padding: 22px 50px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 12px 32px rgba(255, 152, 0, 0.3);
            margin: 20px 0;
            width: 100%;
        }
        
        .lottery-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(255, 152, 0, 0.4);
        }
        
        .lottery-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #ccc;
            box-shadow: none;
        }
        
        .btn-emoji {
            font-size: 28px;
        }
        
        .loading {
            display: none;
            color: #ff9800;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .result-section {
            text-align: center;
            margin: 40px 0;
            padding: 40px 30px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 24px;
            border: 3px solid #81c784;
            display: none;
            animation: popIn 0.6s ease;
        }
        
        .result-title {
            font-size: 26px;
            color: #4caf50;
            margin-bottom: 25px;
        }
        
        .result-emoji {
            font-size: 80px;
            margin-bottom: 25px;
        }
        
        .result-content {
            font-size: 42px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 15px;
        }
        
        .error-msg {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            color: #c62828;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 2px solid #f44336;
            display: none;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px solid #ffecb3;
            color: #666;
        }
        
        .participant-count {
            font-size: 18px;
            font-weight: 500;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .count-number {
            font-weight: 700;
            font-size: 24px;
        }
        
        .features {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 30px;
            }
            
            .stats {
                flex-direction: column;
            }
            
            .lottery-btn {
                padding: 20px 30px;
                font-size: 20px;
            }
            
            .result-content {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-emoji">🍽️✨🏠🎉</div>
            <h1>团建饭店抽签盲盒</h1>
            <p class="subtitle">温暖美食风格 · 公平随机抽取 · 多人在线同步</p>
        </div>
        
        <div class="stats">
            <div class="stat-card home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-card restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <div class="error-msg" id="error-msg"></div>
        
        <div class="lottery-section">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <p style="margin-bottom: 30px; color: #666;">每人仅有一次机会，50%概率随机抽取</p>
            
            <button class="lottery-btn" id="lottery-btn">
                <span class="btn-emoji">🎲</span>
                <span id="btn-text">点击开始抽签</span>
            </button>
            
            <div class="loading" id="loading">✨ 抽签中，请稍候...</div>
        </div>
        
        <div class="result-section" id="result-section">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 20px; color: #666;">已记录结果，上方统计已实时更新 ✨</p>
        </div>
        
        <div class="footer">
            <div class="participant-count">
                👥 已参与人数：<span class="count-number" id="total-count">0</span> 人
            </div>
            <p class="features">🔗 多人在线同步 · 📱 手机电脑通用 · 🎲 50%概率公平</p>
        </div>
    </div>

    <script>
        // 状态管理
        let stats = {
            home: 0,
            restaurant: 0
        };
        
        let userParticipated = false;
        let userResult = null;
        let userId = null;
        
        // DOM元素
        const lotteryBtn = document.getElementById('lottery-btn');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        const errorMsg = document.getElementById('error-msg');
        const countHome = document.getElementById('count-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const percentHome = document.getElementById('percent-home');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalCount = document.getElementById('total-count');
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            // 加载统计数据
            loadStats();
            
            // 检查用户是否已参与
            checkUserParticipation();
            
            // 设置跨标签页通信监听
            setupCrossTabCommunication();
            
            // 每3秒自动同步一次
            setInterval(loadStats, 3000);
        });
        
        // 加载统计数据
        function loadStats() {
            const savedStats = localStorage.getItem('lottery_global_stats');
            
            if (savedStats) {
                stats = JSON.parse(savedStats);
            } else {
                // 初始化统计数据
                stats = { home: 0, restaurant: 0 };
                localStorage.setItem('lottery_global_stats', JSON.stringify(stats));
            }
            
            updateDisplay();
        }
        
        // 更新显示
        function updateDisplay() {
            countHome.textContent = stats.home;
            countRestaurant.textContent = stats.restaurant;
            
            const total = stats.home + stats.restaurant;
            totalCount.textContent = total;
            
            if (total > 0) {
                const homePercent = Math.round(stats.home / total * 100);
                const restaurantPercent = Math.round(stats.restaurant / total * 100);
                
                percentHome.textContent = homePercent + '%';
                percentRestaurant.textContent = restaurantPercent + '%';
            } else {
                percentHome.textContent = '0%';
                percentRestaurant.textContent = '0%';
            }
        }
        
        // 检查用户是否已参与
        function checkUserParticipation() {
            const participated = localStorage.getItem('lottery_participated_' + getUserId());
            const result = localStorage.getItem('lottery_result_' + getUserId());
            
            if (participated === 'true' && result) {
                userParticipated = true;
                userResult = result;
                showResult(result, false);
                
                lotteryBtn.disabled = true;
                btnText.textContent = '已参与抽签';
            }
        }
        
        // 获取或创建用户ID
        function getUserId() {
            if (!userId) {
                userId = localStorage.getItem('lottery_user_id');
                if (!userId) {
                    userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('lottery_user_id', userId);
                }
            }
            return userId;
        }
        
        // 抽签
        async function doLottery() {
            if (userParticipated) {
                showError('您已经抽过签了！');
                return;
            }
            
            // 开始抽签
            lotteryBtn.disabled = true;
            btnText.textContent = '抽签中...';
            loading.style.display = 'block';
            
            // 模拟抽签过程
            await sleep(800);
            
            try {
                // 随机选择
                const isHome = Math.random() < 0.5;
                const selected = isHome ? '家里蹲' : '歆弘府';
                
                // 更新统计数据
                if (isHome) {
                    stats.home++;
                } else {
                    stats.restaurant++;
                }
                
                // 保存到本地存储
                localStorage.setItem('lottery_global_stats', JSON.stringify(stats));
                localStorage.setItem('lottery_participated_' + getUserId(), 'true');
                localStorage.setItem('lottery_result_' + getUserId(), selected);
                
                // 广播更新
                broadcastUpdate();
                
                // 更新状态
                userParticipated = true;
                userResult = selected;
                
                // 更新显示
                updateDisplay();
                
                // 显示结果
                showResult(selected, true);
                
            } catch (error) {
                console.error('抽签失败:', error);
                showError('抽签失败，请刷新重试');
            } finally {
                loading.style.display = 'none';
                
                if (!userParticipated) {
                    lotteryBtn.disabled = false;
                    btnText.textContent = '点击开始抽签';
                } else {
                    btnText.textContent = '已参与抽签';
                }
            }
        }
        
        // 显示结果
        function showResult(result, animate = true) {
            resultContent.textContent = result;
            resultEmoji.textContent = result === '家里蹲' ? '🏠' : '🍽️';
            
            if (animate) {
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
                
                // 简单庆祝效果
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const star = document.createElement('div');
                        star.textContent = '✨';
                        star.style.cssText = `
                            position: fixed;
                            left: ${Math.random() * 100}%;
                            top: ${Math.random() * 100}%;
                            font-size: 24px;
                            opacity: 0.8;
                            z-index: 9999;
                            pointer-events: none;
                            transition: all 1s;
                        `;
                        document.body.appendChild(star);
                        
                        setTimeout(() => {
                            star.style.transform = 'translateY(-50px)';
                            star.style.opacity = '0';
                        }, 100);
                        
                        setTimeout(() => star.remove(), 1200);
                    }, i * 50);
                }
            } else {
                resultSection.style.display = 'block';
            }
        }
        
        // 显示错误
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }
        
        // 跨标签页通信
        function setupCrossTabCommunication() {
            // 监听storage事件（其他标签页的更新）
            window.addEventListener('storage', (event) => {
                if (event.key === 'lottery_broadcast') {
                    loadStats();
                }
            });
            
            // 监听页面可见性变化
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadStats();
                }
            });
        }
        
        // 广播更新
        function broadcastUpdate() {
            localStorage.setItem('lottery_broadcast', Date.now().toString());
        }
        
        // 辅助函数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // 绑定事件
        lotteryBtn.addEventListener('click', doLottery);
    </script>
</body>
</html>
