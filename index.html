<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团建饭店抽签系统</title>
    <meta name="description" content="团建饭店随机抽签系统，温暖美食风格，多人在线同步">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #fffaf0 0%, #ffecb3 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 36px;
            color: #ff9800;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: #ffb74d;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(255, 152, 0, 0.15);
            border: 2px solid #ffd54f;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #ff9800;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #fff8e1;
            border-radius: 12px;
            margin: 10px 0;
            border: 1px solid #ffecb3;
        }
        .option-emoji {
            font-size: 30px;
        }
        .option-name {
            font-size: 20px;
            font-weight: 600;
            color: #ff9800;
        }
        .option-desc {
            color: #666;
            font-size: 14px;
        }
        .start-btn {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 12px 32px rgba(255, 152, 0, 0.3);
            margin: 30px 0;
            width: 100%;
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(255, 152, 0, 0.4);
        }
        .btn-emoji {
            font-size: 28px;
        }
        .rules {
            text-align: left;
            margin-top: 20px;
            color: #666;
        }
        .rules li {
            margin: 8px 0;
            padding-left: 10px;
        }
        .rules li::marker {
            color: #ff9800;
        }
        .footer {
            color: #888;
            font-size: 14px;
            margin-top: 30px;
        }
        .version {
            background: #ffecb3;
            color: #ff9800;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .logo { font-size: 48px; }
            h1 { font-size: 28px; }
            .subtitle { font-size: 16px; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎲🍽️🏠</div>
        <h1>团建饭店抽签系统</h1>
        <p class="subtitle">温暖美食风格 · 公平随机抽取 · 多人在线同步</p>
        
        <div class="card">
            <h2>🎯 抽签选项</h2>
            
            <div class="option">
                <div class="option-emoji">🏠</div>
                <div style="flex: 1; text-align: left; margin-left: 15px;">
                    <div class="option-name">家里蹲</div>
                    <div class="option-desc">温馨舒适，省钱省事</div>
                </div>
            </div>
            
            <div class="option">
                <div class="option-emoji">🍽️</div>
                <div style="flex: 1; text-align: left; margin-left: 15px;">
                    <div class="option-name">歆弘府</div>
                    <div class="option-desc">豪华餐厅，美食盛宴</div>
                </div>
            </div>
            
            <div class="rules">
                <h3 style="color: #ff9800; margin: 20px 0 15px;">📋 抽签规则</h3>
                <ul>
                    <li>✅ <strong>公平随机</strong> - 50%概率随机抽取</li>
                    <li>✅ <strong>每人仅一次</strong> - 公平公正，防止重复</li>
                    <li>✅ <strong>多人在线同步</strong> - 实时统计更新</li>
                    <li>✅ <strong>温暖美食风格</strong> - 舒适界面体验</li>
                    <li>✅ <strong>手机电脑通用</strong> - 全平台支持</li>
                </ul>
            </div>
            
            <button class="start-btn" onclick="startLottery()">
                <span class="btn-emoji">🚀</span>
                <span>立即开始抽签</span>
            </button>
        </div>
        
        <div class="version">最终版 - 无需登录注册</div>
        <div class="footer">
            <p>🔗 多人在线同步 · 📱 手机电脑通用 · 🎲 50%概率公平</p>
        </div>
    </div>

    <script>
        function startLottery() {
            // 推荐使用实时同步版本（Firebase实时数据库）
            window.open('lottery-realtime.html', '_blank');
        }
        
        function startSimpleLottery() {
            // 简单版本（无跨设备同步）
            window.open('lottery-public.html', '_blank');
        }
        
        function openAdminPanel() {
            // 管理员面板（仅限你自己使用）
            window.open('admin-panel.html', '_blank');
        }
        
        // 页面加载时显示版本信息
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎲 团建饭店抽签系统已加载');
            console.log('📱 推荐使用：lottery-realtime.html（多设备实时同步）');
            console.log('🛠️ 管理面板：admin-panel.html');
        });
    </script>
</body>
</html>
