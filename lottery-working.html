<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 团建饭店抽签系统（在线实时版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fffaf0 0%, #fff5e6 100%);
            min-height: 100vh;
            color: #5a3921;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(255, 152, 0, 0.15);
            padding: 40px 30px;
            border: 2px solid rgba(255, 152, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px dashed #ff9800;
        }
        
        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ff6b00;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 rgba(255, 152, 0, 0.1);
        }
        
        .header p {
            font-size: 1.2rem;
            color: #8d6e63;
        }
        
        .emoji-large {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        
        .stat-card.home {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border: 3px solid #2196f3;
        }
        
        .stat-card.restaurant {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            border: 3px solid #f44336;
        }
        
        .stat-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
        
        .stat-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #333;
        }
        
        .stat-count {
            font-size: 4rem;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .stat-percent {
            font-size: 1.4rem;
            font-weight: 700;
            color: #555;
        }
        
        .lottery-section {
            background: linear-gradient(to right, #fff8e1, #ffecb3);
            padding: 40px 30px;
            border-radius: 20px;
            border: 3px solid #ffb74d;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .lottery-title {
            font-size: 2rem;
            color: #ff6b00;
            margin-bottom: 30px;
            font-weight: 700;
        }
        
        .lottery-btn {
            background: linear-gradient(145deg, #ff9800, #ff5722);
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 1.8rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 40px rgba(255, 87, 34, 0.4);
            transition: all 0.3s ease;
        }
        
        .lottery-btn:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 60px rgba(255, 87, 34, 0.6);
        }
        
        .lottery-btn:active:not(:disabled) {
            transform: translateY(-4px);
        }
        
        .lottery-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: linear-gradient(145deg, #bdbdbd, #9e9e9e);
        }
        
        .btn-emoji {
            font-size: 2.5rem;
            animation: spin 3s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #ff9800;
            border-top: 6px solid transparent;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin: 30px auto;
            display: none;
        }
        
        .result-section {
            background: linear-gradient(to right, #e8f5e9, #c8e6c9);
            padding: 40px 30px;
            border-radius: 20px;
            border: 3px solid #4caf50;
            margin-bottom: 40px;
            text-align: center;
            display: none;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-title {
            font-size: 1.8rem;
            color: #4caf50;
            margin-bottom: 30px;
            font-weight: 700;
        }
        
        .result-content {
            font-size: 5rem;
            font-weight: 900;
            color: #1b5e20;
            margin: 30px 0;
            text-shadow: 4px 4px 0 rgba(56, 142, 60, 0.1);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .result-emoji {
            font-size: 6rem;
            display: block;
            margin-bottom: 20px;
            animation: celebrate 1s infinite;
        }
        
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .footer {
            text-align: center;
            padding-top: 30px;
            border-top: 2px dashed #ff9800;
            color: #8d6e63;
        }
        
        .participant-count {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .count-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff6b00;
            margin: 0 5px;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            border: 2px solid #ef9a9a;
        }
        
        @media (max-width: 768px) {
            .container { padding: 25px; }
            .header h1 { font-size: 2.2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .lottery-btn { padding: 20px 40px; font-size: 1.5rem; }
            .result-content { font-size: 3.5rem; }
        }
        
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .header h1 { font-size: 1.8rem; }
            .lottery-btn { padding: 18px 30px; font-size: 1.3rem; }
            .result-content { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="emoji-large">🎲</div>
            <h1>周五吃啥？交给天意！</h1>
            <p>团建饭店随机抽签系统 · 50%概率抽取 · 实时同步 · 多人在线</p>
        </div>
        
        <!-- 统计区域 -->
        <div class="stats-grid">
            <div class="stat-card home" id="stat-home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-card restaurant" id="stat-restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <!-- 错误提示 -->
        <div class="error-message" id="error-message"></div>
        
        <!-- 抽签区域 -->
        <div class="lottery-section">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <p style="margin-bottom: 30px; color: #666; font-size: 1.1rem;">每人仅有一次机会，点击后随机抽取家里蹲或歆弘府</p>
            
            <button class="lottery-btn" id="lottery-btn">
                <span class="btn-emoji">🎲</span>
                <span id="btn-text">点击开始抽签</span>
            </button>
            
            <div class="loading-spinner" id="loading-spinner"></div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result-section" id="result-section">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 30px; color: #666; font-size: 1.2rem;">
                已为你记录抽签结果，上方统计已实时更新
            </p>
        </div>
        
        <!-- 底部信息 -->
        <div class="footer">
            <div class="participant-count">
                👥 已参与人数：
                <span class="count-number" id="total-participants">0</span>
                人
            </div>
            <p style="margin: 15px 0; font-size: 1.1rem;">
                🔗 Supabase实时同步 · 📱 多人在线使用 · 🎲 50%概率随机
            </p>
        </div>
    </div>
    
    <!-- 使用直接的Supabase REST API，不依赖复杂的SDK -->
    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://flarbbfcedplhrpswscm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsYXJiYmZjZWRwbGhycHN3c2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDY4MjQsImV4cCI6MjA4OTkyMjgyNH0.6_j-QbOmgfWT5d_7M6cRFNPZo9JVRj1QQkiEZK5sTGY';
        
        // DOM元素
        const lotteryBtn = document.getElementById('lottery-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        const errorMessage = document.getElementById('error-message');
        
        // 统计元素
        const countHome = document.getElementById('count-home');
        const percentHome = document.getElementById('percent-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalParticipants = document.getElementById('total-participants');
        
        // 用户状态
        let userParticipated = localStorage.getItem('lottery_participated') === 'true';
        let userResult = localStorage.getItem('lottery_result');
        
        // 初始化应用
        async function initApp() {
            console.log('🎲 初始化抽签系统...');
            
            // 检查用户是否已参与
            if (userParticipated) {
                disableLotteryButton();
                showUserResult();
            }
            
            // 加载统计数据
            await loadStatistics();
            
            // 设置自动刷新
            setInterval(loadStatistics, 3000);
            
            console.log('✅ 系统初始化完成');
        }
        
        // 加载统计数据（使用直接的REST API）
        async function loadStatistics() {
            try {
                // 直接查询option_counts表
                const response = await fetch(`${SUPABASE_URL}/rest/v1/option_counts?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) {
                    showError('无法连接到数据库，请检查Supabase配置');
                    return;
                }
                
                const data = await response.json();
                
                // 更新统计数据
                let homeCount = 0;
                let restaurantCount = 0;
                
                data.forEach(item => {
                    if (item.option_name === '家里蹲') {
                        homeCount = item.count || 0;
                    } else if (item.option_name === '歆弘府') {
                        restaurantCount = item.count || 0;
                    }
                });
                
                const total = homeCount + restaurantCount;
                
                // 更新UI
                countHome.textContent = homeCount;
                countRestaurant.textContent = restaurantCount;
                
                if (total > 0) {
                    const homePercent = Math.round((homeCount / total) * 100);
                    const restaurantPercent = Math.round((restaurantCount / total) * 100);
                    
                    percentHome.textContent = `${homePercent}%`;
                    percentRestaurant.textContent = `${restaurantPercent}%`;
                } else {
                    percentHome.textContent = '0%';
                    percentRestaurant.textContent = '0%';
                }
                
                totalParticipants.textContent = total;
                
                // 隐藏错误消息
                hideError();
                
            } catch (error) {
                console.error('加载统计失败:', error);
                showError('网络连接失败，请稍后重试');
            }
        }
        
        // 执行抽签（使用直接的RPC调用）
        async function performLottery() {
            console.log('🎲 开始抽签...');
            
            // 显示加载状态
            lotteryBtn.disabled = true;
            btnText.textContent = '抽签中...';
            loadingSpinner.style.display = 'block';
            
            try {
                // 生成用户ID（使用简单的方式）
                const userId = `user_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                
                // 随机决定结果（50%概率）
                const isHome = Math.random() < 0.5;
                const selectedOption = isHome ? '家里蹲' : '歆弘府';
                
                // 1. 插入抽签记录
                const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/lottery_records`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        selected_option: selectedOption,
                        user_ip: null,
                        user_agent: navigator.userAgent
                    })
                });
                
                if (!insertResponse.ok) {
                    // 检查是否重复
                    if (insertResponse.status === 409) {
                        showError('您已经抽过签了，每人仅有一次机会哦！');
                        disableLotteryButton();
                        return;
                    }
                    throw new Error('插入记录失败');
                }
                
                // 2. 更新选项计数
                const countField = isHome ? 'count' : 'count';
                const updateResponse = await fetch(`${SUPABASE_URL}/rest/v1/option_counts?option_name=eq.${selectedOption}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        count: `count + 1`
                    })
                });
                
                if (!updateResponse.ok) {
                    throw new Error('更新计数失败');
                }
                
                // 抽签成功
                console.log('🎉 抽签结果:', selectedOption);
                
                // 保存用户状态
                userParticipated = true;
                userResult = selectedOption;
                localStorage.setItem('lottery_participated', 'true');
                localStorage.setItem('lottery_result', selectedOption);
                
                // 显示结果
                showLotteryResult(selectedOption);
                
                // 重新加载统计
                setTimeout(() => loadStatistics(), 1000);
                
            } catch (error) {
                console.error('抽签异常:', error);
                showError('抽签过程中出现错误，请刷新页面重试');
                resetLotteryButton();
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }
        
        // 显示抽签结果
        function showLotteryResult(result) {
            // 禁用按钮
            disableLotteryButton();
            
            // 设置结果内容
            if (result === '家里蹲') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultContent.style.color = '#2196f3';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultContent.style.color = '#f44336';
            }
            
            // 显示结果容器
            resultSection.style.display = 'block';
            
            // 滚动到结果
            setTimeout(() => {
                resultSection.scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'center' 
                });
            }, 300);
            
            // 播放庆祝效果
            playCelebration();
        }
        
        // 显示用户之前的结果
        function showUserResult() {
            if (!userResult) return;
            
            if (userResult === '家里蹲') {
                resultContent.textContent = '家里蹲';
                resultEmoji.textContent = '🏠';
                resultContent.style.color = '#2196f3';
            } else {
                resultContent.textContent = '歆弘府';
                resultEmoji.textContent = '🍽️';
                resultContent.style.color = '#f44336';
            }
            
            resultSection.style.display = 'block';
            btnText.textContent = '已抽签';
        }
        
        // 禁用抽签按钮
        function disableLotteryButton() {
            lotteryBtn.disabled = true;
            btnText.textContent = '已抽签';
        }
        
        // 重置抽签按钮
        function resetLotteryButton() {
            lotteryBtn.disabled = false;
            btnText.textContent = '点击开始抽签';
        }
        
        // 显示错误消息
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        // 隐藏错误消息
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        // 庆祝效果
        function playCelebration() {
            // 简单的动画效果
            const emojis = ['🎉', '✨', '🥳', '🎊', '👏'];
            const container = document.querySelector('.container');
            
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.position = 'absolute';
                    emoji.style.fontSize = '25px';
                    emoji.style.left = `${Math.random() * 100}%`;
                    emoji.style.top = `${Math.random() * 100}%`;
                    emoji.style.zIndex = '1000';
                    emoji.style.pointerEvents = 'none';
                    emoji.style.opacity = '1';
                    emoji.style.transition = 'all 1s ease-out';
                    
                    container.appendChild(emoji);
                    
                    // 动画
                    setTimeout(() => {
                        emoji.style.transform = 'translateY(-100px)';
                        emoji.style.opacity = '0';
                    }, 100);
                    
                    // 清理
                    setTimeout(() => emoji.remove(), 1500);
                }, i * 100);
            }
        }
        
        // 事件监听
        lotteryBtn.addEventListener('click', performLottery);
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !userParticipated) {
                e.preventDefault();
                lotteryBtn.click();
            }
        });
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initApp);
        
        // 初始化日志
        console.log('🚀 抽签系统已加载（直接REST API版本）');
        console.log('📊 Supabase URL:', SUPABASE_URL);
        console.log('🎯 功能：多人在线、实时统计、防重复');
    </script>
</body>
</html>
