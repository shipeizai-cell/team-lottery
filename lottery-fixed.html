<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团建饭店抽签系统（修复版）</title>
    <style>
        /* 温暖美食风格样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background-color: #fffaf0; /* 米白色背景 */
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 12px 48px rgba(255, 152, 0, 0.08);
            border: 2px solid #ffecb3;
            position: relative;
            overflow: hidden;
        }
        
        /* 顶部装饰 */
        .header-decoration {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff9800, #ffb74d, #ffd54f, #ffecb3, #ffb74d, #ff9800);
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .sub-title {
            color: #ffb74d;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .food-emoji {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        /* 统计卡片 */
        .stats-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.08);
            border: 1px solid #ffe082;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
        }
        
        .stat-emoji {
            font-size: 36px;
            margin-bottom: 12px;
        }
        
        .stat-name {
            font-size: 18px;
            font-weight: 600;
            color: #ff9800;
            margin-bottom: 8px;
        }
        
        .stat-count {
            font-size: 32px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 4px;
        }
        
        .stat-percent {
            font-size: 14px;
            color: #ffb74d;
            font-weight: 500;
        }
        
        /* 错误消息 */
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #f44336;
            display: none;
        }
        
        /* 抽签区域 */
        .lottery-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .lottery-title {
            font-size: 24px;
            color: #ff9800;
            margin-bottom: 16px;
        }
        
        .lottery-btn {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(255, 152, 0, 0.2);
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
        }
        
        .lottery-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 152, 0, 0.3);
        }
        
        .lottery-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: #ccc;
        }
        
        .btn-emoji {
            font-size: 24px;
        }
        
        .loading {
            display: none;
            font-size: 16px;
            color: #ff9800;
            margin-top: 10px;
        }
        
        /* 结果区域 */
        .result-section {
            text-align: center;
            margin: 40px 0;
            padding: 30px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 16px;
            border: 2px solid #81c784;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .result-title {
            font-size: 22px;
            color: #4caf50;
            margin-bottom: 20px;
        }
        
        .result-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-content {
            font-size: 32px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 10px;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ffecb3;
            color: #666;
        }
        
        .participant-count {
            font-size: 16px;
            font-weight: 500;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .count-number {
            font-weight: 700;
            font-size: 20px;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .stats-section {
                flex-direction: column;
            }
            
            .main-title {
                font-size: 28px;
            }
            
            .lottery-btn {
                padding: 18px 30px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-decoration"></div>
        
        <div class="title-section">
            <div class="food-emoji">🍽️🏠✨</div>
            <h1 class="main-title">团建饭店抽签盲盒</h1>
            <p class="sub-title">温暖美食风格 · 公平随机抽取 · 多人在线同步</p>
        </div>
        
        <div class="stats-section">
            <div class="stat-card home">
                <div class="stat-emoji">🏠</div>
                <div class="stat-name">家里蹲</div>
                <div class="stat-count" id="count-home">0</div>
                <div class="stat-percent" id="percent-home">0%</div>
            </div>
            
            <div class="stat-card restaurant">
                <div class="stat-emoji">🍽️</div>
                <div class="stat-name">歆弘府</div>
                <div class="stat-count" id="count-restaurant">0</div>
                <div class="stat-percent" id="percent-restaurant">0%</div>
            </div>
        </div>
        
        <div class="error-msg" id="error-msg"></div>
        
        <div class="lottery-section">
            <h2 class="lottery-title">🎯 点击抽取你的今日盲盒</h2>
            <p style="margin-bottom: 30px; color: #666;">每人仅有一次机会，50%概率随机抽取</p>
            
            <button class="lottery-btn" id="lottery-btn">
                <span class="btn-emoji">🎲</span>
                <span id="btn-text">点击开始抽签</span>
            </button>
            
            <div class="loading" id="loading">抽签中，请稍候...</div>
        </div>
        
        <div class="result-section" id="result-section">
            <h3 class="result-title">🎉 恭喜你抽中了</h3>
            <div class="result-emoji" id="result-emoji">🏠</div>
            <div class="result-content" id="result-content">家里蹲</div>
            <p style="margin-top: 20px; color: #666;">已记录结果，上方统计已实时更新</p>
        </div>
        
        <div class="footer">
            <div class="participant-count">
                👥 已参与人数：<span class="count-number" id="total-count">0</span> 人
            </div>
            <p>🔗 Supabase实时同步 · 📱 多人在线 · 🎲 50%概率</p>
        </div>
    </div>

    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://flarbbfcedplhrpswscm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsYXJiYmZjZWRwbGhycHN3c2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDY4MjQsImV4cCI6MjA4OTkyMjgyNH0.6_j-QbOmgfWT5d_7M6cRFNPZo9JVRj1QQkiEZK5sTGY';
        
        // DOM元素
        const lotteryBtn = document.getElementById('lottery-btn');
        const btnText = document.getElementById('btn-text');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const resultEmoji = document.getElementById('result-emoji');
        const errorMsg = document.getElementById('error-msg');
        const countHome = document.getElementById('count-home');
        const countRestaurant = document.getElementById('count-restaurant');
        const percentHome = document.getElementById('percent-home');
        const percentRestaurant = document.getElementById('percent-restaurant');
        const totalCount = document.getElementById('total-count');
        
        // 状态变量
        let userParticipated = false;
        let userResult = null;
        
        // 页面加载
        window.addEventListener('load', async () => {
            // 检查是否已参与
            if (localStorage.getItem('lottery_participated') === 'true') {
                userParticipated = true;
                userResult = localStorage.getItem('lottery_result');
                if (userResult) showResult(userResult);
            }
            
            // 加载统计
            await loadStats();
            setInterval(loadStats, 3000);
        });
        
        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/option_counts?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                
                if (!res.ok) throw new Error('加载失败');
                
                const data = await res.json();
                let home = 0, restaurant = 0;
                
                data.forEach(item => {
                    if (item.option_name === '家里蹲') home = item.count;
                    else if (item.option_name === '歆弘府') restaurant = item.count;
                });
                
                const total = home + restaurant;
                
                countHome.textContent = home;
                countRestaurant.textContent = restaurant;
                totalCount.textContent = total;
                
                if (total > 0) {
                    percentHome.textContent = Math.round(home / total * 100) + '%';
                    percentRestaurant.textContent = Math.round(restaurant / total * 100) + '%';
                }
                
                hideError();
            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }
        
        // 抽签（修复版：确保按钮状态被正确恢复）
        async function doLottery() {
            if (userParticipated) {
                showError('您已经抽过签了！');
                return;
            }
            
            // 开始抽签：禁用按钮，显示加载状态
            lotteryBtn.disabled = true;
            btnText.textContent = '抽签中...';
            loading.style.display = 'block';
            
            try {
                // 随机选择
                const isHome = Math.random() < 0.5;
                const selected = isHome ? '家里蹲' : '歆弘府';
                const userId = `user_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                
                // 插入抽签记录
                const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/lottery_records`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        selected_option: selected,
                        user_agent: navigator.userAgent
                    })
                });
                
                if (insertRes.status === 409) {
                    showError('您已经抽过签了！');
                    // 恢复按钮状态
                    resetButtonState();
                    return;
                }
                
                if (!insertRes.ok) {
                    throw new Error('插入记录失败: ' + insertRes.status);
                }
                
                // 更新选项计数
                const countResponse = await fetch(`${SUPABASE_URL}/rest/v1/option_counts?option_name=eq.${selected}`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                
                if (countResponse.ok) {
                    const countData = await countResponse.json();
                    const currentCount = countData[0]?.count || 0;
                    
                    await fetch(`${SUPABASE_URL}/rest/v1/option_counts?option_name=eq.${selected}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ count: currentCount + 1 })
                    });
                }
                
                // 保存用户状态
                userParticipated = true;
                userResult = selected;
                localStorage.setItem('lottery_participated', 'true');
                localStorage.setItem('lottery_result', selected);
                
                // 显示结果
                showResult(selected);
                // 立即刷新统计
                await loadStats();
                
            } catch (err) {
                console.error('抽签失败:', err);
                showError('抽签失败，请刷新重试');
            } finally {
                // 无论成功还是失败，都恢复按钮状态（但保持禁用状态）
                loading.style.display = 'none';
                
                if (!userParticipated) {
                    // 如果抽签失败，恢复按钮可点击状态
                    lotteryBtn.disabled = false;
                    btnText.textContent = '点击开始抽签';
                } else {
                    // 如果抽签成功，按钮显示已参与状态
                    btnText.textContent = '已参与抽签';
                    lotteryBtn.disabled = true;
                }
            }
        }
        
        // 辅助函数：恢复按钮状态
        function resetButtonState() {
            lotteryBtn.disabled = false;
            btnText.textContent = '点击开始抽签';
            loading.style.display = 'none';
        }
        
        function showResult(result) {
            resultContent.textContent = result;
            resultEmoji.textContent = result === '家里蹲' ? '🏠' : '🍽️';
            resultSection.style.display = 'block';
            resultSection.scrollIntoView({ behavior: 'smooth' });
            
            // 庆祝动画
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.textContent = ['🎉', '✨', '🥳'][Math.floor(Math.random() * 3)];
                    el.style.cssText = 'position:fixed;left:' + Math.random() * 100 + '%;top:' + Math.random() * 100 + '%;font-size:30px;pointer-events:none;z-index:9999;transition:all 1s';
                    document.body.appendChild(el);
                    setTimeout(() => { el.style.transform = 'translateY(-100px)'; el.style.opacity = '0'; }, 100);
                    setTimeout(() => el.remove(), 1100);
                }, i * 100);
            }
        }
        
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(hideError, 3000);
        }
        
        function hideError() {
            errorMsg.style.display = 'none';
        }
        
        lotteryBtn.addEventListener('click', doLottery);
    </script>
</body>
</html>
